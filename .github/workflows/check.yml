name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --locked
